name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prod-cutover tripwire (ADR-0002, issue #70): fail if commerce/Stripe
      # code lands in src/ before the prod cutover is recorded by a committed
      # .prod-cutover-verified marker. Runs first — it is fast, needs no
      # secrets, and is a release-safety gate independent of the phase matrix.
      - run: pnpm gate:prod-cutover
      # The phase gate: typecheck, lint, four-layer access-isolation check,
      # migration generation, unit + integration tests, production build.
      # verify-phase falls back to placeholder env values for db:generate and
      # build, so this runs with zero repository secrets. Live-DB checks
      # (smoke:scoped-db, verify:db-schema) stay local — they need a real
      # Neon branch.
      - run: pnpm verify:phase-0

  # verify:ui — the DAWN UI gate (separate job so the fast phase-0 gate is not
  # slowed by a browser download + production build). Runs axe-core (WCAG 2.1 AA,
  # zero violations) on /playground/dashboard ALWAYS, and compares Linux
  # screenshot baselines (committed under e2e/**-snapshots/, generated in this
  # same Playwright image so they match this runner). Placeholder env mirrors
  # verify-phase so build + `next start` boot with zero repository secrets.
  verify-ui:
    runs-on: ubuntu-latest
    # Clerk env (zero real secrets). `next start` THROWS on boot if the publishable
    # key is missing or malformed, so we pass a FORMAT-VALID dummy
    # (pk_test_ + base64("clerk.example.com$")). That host is unreachable, but the
    # playground is excluded from clerkMiddleware (src/proxy.ts matcher), so it never
    # triggers Clerk's dev-browser handshake redirect to that host — the route renders
    # deterministically with no Clerk frontend API reachable. DATABASE_URL is a
    # harmless placeholder for the build step.
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Browsers + OS deps must match the Playwright version in package.json.
      - run: pnpm exec playwright install --with-deps chromium
      # Build once here; the Playwright webServer (CI mode) only runs `pnpm start`.
      - run: pnpm build
      - run: pnpm verify:ui
      - if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
